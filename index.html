<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GWT Mobile · Игры с торрентами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #0f0f1a;
            --bg-card: rgba(18, 18, 30, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --accent-color: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --card-radius: 20px;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, 'Inter', 'Segoe UI', Roboto, sans-serif;
            padding-bottom: 70px;
            min-height: 100vh;
        }

        /* Мобильный хедер */
        .header {
            background: rgba(10, 10, 18, 0.95);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 16px;
            border-bottom: 1px solid var(--accent-color);
        }

        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.6rem;
            color: var(--text-secondary);
        }

        /* Поиск (мобильный) */
        .search-panel {
            padding: 16px;
        }
        .search-box {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--accent-color);
            border-radius: 40px;
            overflow: hidden;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 18px;
            color: white;
            font-size: 0.95rem;
        }
        .search-box button {
            background: var(--accent-color);
            border: none;
            padding: 0 20px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        /* Фильтры — горизонтальный скролл */
        .filters-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .filters {
            display: inline-flex;
            gap: 10px;
        }
        .filter-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--accent-color);
            color: #000;
        }

        /* Сетка карточек — мобильная оптимизация */
        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
        }
        .game-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: var(--card-radius);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.2s;
        }
        .game-card:active {
            transform: scale(0.98);
        }
        .game-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .game-info {
            padding: 14px;
        }
        .game-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }
        .game-meta span {
            background: rgba(0,229,255,0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .game-description {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 10px 0;
            line-height: 1.4;
        }
        .game-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .detail-btn {
            flex: 1;
            background: transparent;
            border: 1.5px solid var(--accent-color);
            padding: 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            color: var(--accent-color);
        }
        .detail-btn:active {
            background: var(--accent-color);
            color: #000;
        }

        /* Нижняя навигация (mobile) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 18, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--accent-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
        }
        .bottom-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }
        .bottom-nav a.active {
            color: var(--accent-color);
        }
        .bottom-nav span:first-child {
            font-size: 1.5rem;
        }

        /* Модалка под мобилу */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            z-index: 2000;
            overflow-y: auto;
        }
        .modal-content {
            margin: 16px;
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--accent-color);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 2rem;
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
        }
        .reviews-section {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 14px;
            margin-top: 16px;
        }
        .add-review {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .add-review input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--accent-color);
            padding: 10px;
            border-radius: 30px;
            color: white;
        }
        .add-review button {
            background: var(--accent-color);
            border: none;
            padding: 0 18px;
            border-radius: 30px;
            font-weight: bold;
        }

        .install-banner {
            background: linear-gradient(135deg, var(--accent-color), #ff44cc);
            margin: 16px;
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        .hidden { display: none; }
        .section { display: none; }
        .section.active { display: block; }

        @media (min-width: 768px) {
            .games-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
        @media (min-width: 1024px) {
            .games-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">
        <h1>🎮 GWT · MOBILE</h1>
        <p>TORRENT GAMES · ANDROID EDITION</p>
    </div>
</header>

<div class="search-panel">
    <div class="search-box">
        <input type="text" id="mobileSearch" placeholder="🔍 Поиск игр...">
        <button id="searchBtnMobile">НАЙТИ</button>
    </div>
</div>

<div class="filters-wrapper">
    <div class="filters" id="mobileFilters"></div>
</div>

<!-- Секции -->
<div id="pcSection" class="section active"><div class="games-grid" id="pcGridMobile"></div></div>
<div id="androidSection" class="section"><div class="games-grid" id="androidGridMobile"></div></div>
<div id="updatesSection" class="section">
    <div style="padding: 16px;">
        <div style="background: var(--bg-card); border-radius: 24px; padding: 20px;">
            <h3 style="color: var(--accent-color);">📱 МОБИЛЬНОЕ ОБНОВЛЕНИЕ</h3>
            <ul style="margin-top: 16px; list-style: none;">
                <li>✅ Полная поддержка Android-игр</li>
                <li>✅ APK скачивание напрямую</li>
                <li>✅ Установите GWT как приложение</li>
            </ul>
        </div>
    </div>
</div>

<!-- Баннер установки приложения -->
<div class="install-banner" id="installBanner" onclick="installApp()">
    📱 УСТАНОВИТЬ ПРИЛОЖЕНИЕ → Добавить на рабочий стол
</div>

<!-- Нижняя навигация -->
<div class="bottom-nav">
    <a href="#" data-section="pc" class="active"><span>🎮</span><span>Игры</span></a>
    <a href="#" data-section="android"><span>📱</span><span>Android</span></a>
    <a href="#" data-section="updates"><span>🔄</span><span>Обновления</span></a>
</div>

<!-- Модалка -->
<div id="gameModal" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close" id="closeModalBtn">✖</button>
        <div style="padding: 20px;">
            <h2 id="modalTitle" style="font-size: 1.6rem;"></h2>
            <div id="modalMeta" class="game-meta" style="margin: 12px 0;"></div>
            <img id="modalImage" style="width: 100%; border-radius: 16px; margin: 12px 0;">
            <p id="modalDesc" style="color: var(--text-secondary);"></p>
            <div id="requirementsContainer" style="margin: 12px 0;"></div>
            <button id="modalDownloadBtn" style="width: 100%; background: var(--accent-color); border: none; padding: 14px; border-radius: 40px; font-weight: bold; margin: 12px 0;">⚡ СКАЧАТЬ</button>
            <div class="reviews-section">
                <h4>💬 Отзывы</h4>
                <div id="reviewsList"></div>
                <div class="add-review">
                    <input type="text" id="newReviewInput" placeholder="Написать отзыв...">
                    <button id="addReviewBtn">→</button>
                </div>
            </div>
            <div style="margin-top: 16px;">
                <iframe id="modalTrailer" style="width: 100%; height: 200px; border-radius: 16px; border: 1px solid var(--accent-color);" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== БАЗА ИГР ==========
    const PC_GAMES = [
        { name: "Cyberpunk 2077", year: 2020, size: "65 GB", genre: "RPG", desc: "Киберпанк в Найт-Сити.", image: "images/Cyberpunk 2077 Image.jpg", torrent: "torrents/cyberpunk-2077.torrent", trailer: "qIcTM8WXFjk" },
        { name: "Elden Ring", year: 2022, size: "48 GB", genre: "RPG", desc: "Шедевр от FromSoftware.", image: "images/Elden_Ring_-_Image.jpg", torrent: "torrents/Elden-Ring-by-Igruha.torrent", trailer: "gGtKJ_5ZOYg" },
        { name: "Resident Evil 4 Remake", year: 2023, size: "55 GB", genre: "Хоррор", desc: "Ремейк легенды.", image: "images/Resident Evil 4 Image.jpg", torrent: "torrents/resident-evil-4.torrent", trailer: "Id2EaldBaWw" },
        { name: "Silent Hill F", year: 2024, size: "45 GB", genre: "Хоррор", desc: "Новый хоррор.", image: "images/Silent_Hill_f Image.jpg", torrent: "torrents/silent-hill-f.torrent", trailer: "0-eMuy6UJ6U" },
        { name: "Call of Duty BO6", year: 2024, size: "160 GB", genre: "Шутеры", desc: "Шпионский экшен.", image: "images/Call of Duty Black Ops 6 Image.jpg", torrent: "torrents/cod-bops6.torrent", trailer: "h0uxvKUjsj4" },
        { name: "Atomic Heart", year: 2023, size: "90 GB", genre: "Шутеры", desc: "СССР с роботами.", image: "images/Atomic Heart Image.jpg", torrent: "torrents/atomic-heart.torrent", trailer: "lG4kPj05OlM" },
        { name: "ULTRAKILL", year: 2020, size: "1.2 GB", genre: "Шутеры", desc: "Бешеный хардкор.", image: "images/Ultrakill Image.jpg", torrent: "torrents/ultrakill.torrent", trailer: "FM6L_CjR5ZE" },
        { name: "Hitman WoA", year: 2021, size: "80 GB", genre: "Стелс", desc: "Трилогия убийцы.", image: "images/Hitman world assasins Image.jpg", torrent: "torrents/hitman-woa.torrent", trailer: "WB2BSbaRmgY" },
        { name: "Metal Gear Rising", year: 2013, size: "25 GB", genre: "Слешеры", desc: "Руби металл.", image: "images/Metal_Gear_Rising_Revengeance_Image.jpg", torrent: "torrents/mgr.torrent", trailer: "EMCkbDnaTDM" },
        { name: "Slime Rancher 2", year: 2025, size: "8 GB", genre: "Симулятор", desc: "Милота и слаймы.", image: "images/Slime Rancher 2 Image.jpg", torrent: "torrents/slime-rancher2.torrent", trailer: "wQXXXtOXvfE" },
        { name: "Deltarune", year: 2018, size: "200 MB", genre: "Инди", desc: "От создателя Undertale.", image: "images/Deltarune Image.jpg", torrent: "torrents/deltarune.torrent", trailer: "yDzgiGdekas" },
        { name: "Geometry Dash", year: 2013, size: "150 MB", genre: "Аркада", desc: "Ритм-экстрим.", image: "images/Geometry Dash Image.jpg", torrent: "torrents/geometry-dash.torrent", trailer: "k90y6PIzIaE" },
        { name: "GTA V", year: 2015, size: "95 GB", genre: "Экшен", desc: "Лос-Сантос.", image: "images/Gta 5 Image.jpg", torrent: "torrents/gta5.torrent", trailer: "QkkoHAzjnUs" },
        { name: "RDR 2", year: 2019, size: "109 GB", genre: "Экшен", desc: "Дикий запад.", image: "images/RDR2 Image.jpg", torrent: "torrents/rdr2.torrent", trailer: "gmA6MrX81z4" },
        { name: "Hollow Knight", year: 2017, size: "9 GB", genre: "Инди", desc: "Метроидвания.", image: "images/Hollow Knight Image.jpg", torrent: "torrents/hollow-knight.torrent", trailer: "UAO2urG23S4" }
    ];

    const ANDROID_GAMES = [
        { name: "Hollow Knight (Android)", year: 2022, size: "850 MB", genre: "Инди", desc: "Полная версия на Android.", image: "android/images/Hollow_Knight.jpg", file: "https://drive.google.com/uc?export=download&id=1jxjmbdptosfvj5oEOvArdeM7jV1hLJdS" },
        { name: "ULTRAKILL Mobile", year: 2023, size: "280 MB", genre: "Шутеры", desc: "Мобильная версия.", image: "android/images/Ultrakill_cover.jpg", file: "https://drive.google.com/uc?export=download&id=1ZBevkpCbDKH0WOrYsca6Ks8mmwiO-gl2" },
        { name: "Hotline Miami", year: 2023, size: "120 MB", genre: "Экшен", desc: "Кровавое ретро.", image: "android/images/Hotline_Miami_cover.jpg", file: "https://drive.google.com/uc?export=download&id=1_FC7SeOzFTrEol_2kd_6gzBMguUEgnSv" }
    ];

    let currentSection = "pc";
    let currentFilter = "all";
    let searchQuery = "";
    let currentGame = null;
    let reviewsDB = {};

    // Загрузка/сохранение отзывов
    function loadReviews(gameName) {
        let stored = localStorage.getItem(`reviews_mobile_${gameName}`);
        reviewsDB[gameName] = stored ? JSON.parse(stored) : ["🔥 Классная игра!", "👍 Топ торрент"];
        renderReviews(gameName);
    }
    function renderReviews(gameName) {
        const container = document.getElementById("reviewsList");
        if(!container) return;
        container.innerHTML = "";
        (reviewsDB[gameName] || []).forEach(r => {
            let div = document.createElement("div");
            div.style.padding = "8px 0";
            div.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
            div.innerText = r;
            container.appendChild(div);
        });
    }
    function addReview(gameName, text) {
        if(text.trim()) {
            if(!reviewsDB[gameName]) reviewsDB[gameName] = [];
            reviewsDB[gameName].push(text);
            localStorage.setItem(`reviews_mobile_${gameName}`, JSON.stringify(reviewsDB[gameName]));
            renderReviews(gameName);
        }
    }

    // Рендер игр
    function renderGames() {
        let source = currentSection === "pc" ? PC_GAMES : ANDROID_GAMES;
        let filtered = source.filter(g => currentFilter === "all" || g.genre === currentFilter);
        if(searchQuery) filtered = filtered.filter(g => g.name.toLowerCase().includes(searchQuery) || g.desc.toLowerCase().includes(searchQuery));
        
        const container = document.getElementById(currentSection === "pc" ? "pcGridMobile" : "androidGridMobile");
        if(!container) return;
        container.innerHTML = "";
        
        filtered.forEach(game => {
            const card = document.createElement("div");
            card.className = "game-card";
            card.innerHTML = `
                <img src="${game.image}" class="game-img" onerror="this.src='https://placehold.co/400x200/1a1a2e/00e5ff?text=GWT'">
                <div class="game-info">
                    <div class="game-title">${game.name}</div>
                    <div class="game-meta"><span>📅 ${game.year}</span><span>🎮 ${game.genre}</span><span>💾 ${game.size}</span></div>
                    <div class="game-description">${game.desc.substring(0,80)}...</div>
                    <div class="game-actions">
                        <button class="detail-btn" data-game='${JSON.stringify(game).replace(/'/g, "&#39;")}'>Детали</button>
                        <button class="download-btn" data-game='${JSON.stringify(game).replace(/'/g, "&#39;")}'>Скачать</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        
        // Вешаем события
        document.querySelectorAll(".detail-btn").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                openModal(JSON.parse(btn.getAttribute("data-game")));
            };
        });
        document.querySelectorAll(".download-btn").forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const game = JSON.parse(btn.getAttribute("data-game"));
                if(game.file) window.open(game.file, "_blank");
                else if(game.torrent) {
                    let a = document.createElement('a');
                    a.href = game.torrent;
                    a.download = `${game.name}.torrent`;
                    a.click();
                    alert("✅ Торрент загружается");
                }
            };
        });
    }

    function openModal(game) {
        currentGame = game;
        document.getElementById("modalTitle").innerText = game.name;
        document.getElementById("modalMeta").innerHTML = `<span>📅 ${game.year}</span><span>🎮 ${game.genre}</span><span>💾 ${game.size}</span>`;
        document.getElementById("modalDesc").innerText = game.desc;
        document.getElementById("modalImage").src = game.image || "https://placehold.co/400x220";
        document.getElementById("requirementsContainer").innerHTML = `<div style="background:rgba(0,229,255,0.1); padding:10px; border-radius:16px;">📱 ОС: Android 10+ / Windows 10+<br>⚡ RAM: 4-8 GB</div>`;
        const iframe = document.getElementById("modalTrailer");
        if(game.trailer) iframe.src = `https://www.youtube.com/embed/${game.trailer}?rel=0`;
        else iframe.src = "";
        document.getElementById("modalDownloadBtn").onclick = () => {
            if(game.file) window.open(game.file, "_blank");
            else if(game.torrent) {
                let a = document.createElement('a');
                a.href = game.torrent;
                a.download = `${game.name}.torrent`;
                a.click();
                alert("✅ Загрузка начата");
            }
        };
        loadReviews(game.name);
        document.getElementById("gameModal").style.display = "block";
        document.body.style.overflow = "hidden";
        
        const addBtn = document.getElementById("addReviewBtn");
        const inputRev = document.getElementById("newReviewInput");
        addBtn.onclick = () => { if(currentGame) addReview(currentGame.name, inputRev.value); inputRev.value = ""; };
    }

    function closeModal() {
        document.getElementById("gameModal").style.display = "none";
        document.getElementById("modalTrailer").src = "";
        document.body.style.overflow = "auto";
    }

    function switchSection(section) {
        currentSection = section;
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.getElementById(`${section}Section`).classList.add("active");
        document.querySelectorAll(".bottom-nav a").forEach(a => a.classList.remove("active"));
        document.querySelector(`.bottom-nav a[data-section="${section}"]`).classList.add("active");
        
        // Обновляем фильтры
        const filtersContainer = document.getElementById("mobileFilters");
        let genres = section === "pc" ? ["all","RPG","Хоррор","Шутеры","Экшен","Стелс","Слешеры","Симулятор","Инди","Аркада"] : ["all","Инди","Экшен","Шутеры"];
        filtersContainer.innerHTML = genres.map(g => `<button class="filter-btn ${currentFilter === g ? 'active' : ''}" data-filter="${g}">${g === 'all' ? 'ВСЕ' : g.toUpperCase()}</button>`).join("");
        
        document.querySelectorAll("#mobileFilters .filter-btn").forEach(btn => {
            btn.onclick = () => {
                currentFilter = btn.getAttribute("data-filter");
                renderGames();
                document.querySelectorAll("#mobileFilters .filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            };
        });
        renderGames();
    }

    // Установка PWA
    function installApp() {
        alert("📱 Чтобы установить приложение:\n\n1. Нажмите ⋮ (меню браузера)\n2. Выберите 'Установить приложение' или 'Добавить на главный экран'\n3. Подтвердите установку");
    }

    // Поиск
    document.getElementById("searchBtnMobile").onclick = () => {
        searchQuery = document.getElementById("mobileSearch").value.toLowerCase();
        renderGames();
    };
    document.getElementById("mobileSearch").addEventListener("keyup", (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderGames();
    });

    // Навигация
    document.querySelectorAll(".bottom-nav a").forEach(a => {
        a.onclick = (e) => {
            e.preventDefault();
            switchSection(a.getAttribute("data-section"));
        };
    });
    document.getElementById("closeModalBtn").onclick = closeModal;
    window.onclick = (e) => { if(e.target === document.getElementById("gameModal")) closeModal(); };
    
    // Запуск
    switchSection("pc");
</script>
</body>
</html>
